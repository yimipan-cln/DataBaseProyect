<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Ventas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@media print {

    body * {
        visibility: hidden;
    }

    #areaTicket,
    #areaTicket * {
        visibility: visible;
    }

    #areaTicket {

        position: absolute;

        left: 0;
        top: 0;

        width: 100%;

    }

}

</style>

</head>

<body>

<div class="container mt-5">

<h1>Registrar Venta</h1>

<select
id="clienteId"
class="form-control mb-2">
</select>

<select
id="productoId"
class="form-control mb-2">
</select>

<input
id="cantidad"
class="form-control mb-2"
type="number"
placeholder="Cantidad">

<button
class="btn btn-secondary mb-3"
onclick="agregarProducto()">
Agregar Producto
</button>

<table class="table">

<thead>
<tr>
<th>ID Producto</th>
<th>Cantidad</th>
</tr>
</thead>

<tbody id="tablaProductos">

</tbody>

</table>

<button
class="btn btn-primary"
onclick="registrarVenta()">
Registrar Venta
</button>

<hr>

<div id="areaTicket">

    <h3>Ticket de Venta</h3>

    <pre id="ticketVenta"></pre>

</div>

<button
    class="btn btn-success"
    onclick="window.print()">
    Imprimir Ticket
</button>

</div>

<script src="/js/ventas.js"></script>

</body>
</html>
