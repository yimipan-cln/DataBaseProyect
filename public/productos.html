<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Productos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h1>Productos</h1>

<form id="formProducto">

<input
class="form-control mb-2"
type="text"
id="nombre"
placeholder="Nombre"
required>

<input
class="form-control mb-2"
type="text"
id="categoria"
placeholder="Categoría"
required>

<input
class="form-control mb-2"
type="number"
id="precio"
placeholder="Precio"
required>

<input
class="form-control mb-2"
type="number"
id="stock"
placeholder="Stock"
required>

<button class="btn btn-primary">
Guardar
</button>

</form>

<hr>

<table class="table">

<thead>

<tr>
<th>Nombre</th>
<th>Categoría</th>
<th>Precio</th>
<th>Stock</th>
</tr>

</thead>

<tbody id="tablaProductos">

</tbody>

</table>

</div>

<script src="js/productos.js"></script>

</body>
</html>
