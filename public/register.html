<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">

  <h2 class="text-center mb-4">Registro</h2>

  <form id="registerForm" class="card p-4">

    <input type="text" class="form-control mb-3" placeholder="Nombre" id="nombre" required>

    <input type="email" class="form-control mb-3" placeholder="Email" id="email" required>

    <input type="password" class="form-control mb-3" placeholder="Contraseña" id="password" required>

    <button class="btn btn-success w-100" type="submit">
      Crear cuenta
    </button>

  </form>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const res = await fetch("/auth/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      nombre: nombre.value,
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.message) {
    alert("Usuario creado");
    window.location.href = "/login.html";
  } else {
    alert(data.error);
  }
});
</script>

</body>
</html>
