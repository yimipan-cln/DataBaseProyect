<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - TechStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 400px;">

  <h2 class="text-center mb-4">Iniciar sesión</h2>

  <form id="loginForm" class="card p-4">

    <input type="email" class="form-control mb-3" placeholder="Email" id="email" required>

    <input type="password" class="form-control mb-3" placeholder="Contraseña" id="password" required>

    <button class="btn btn-primary w-100" type="submit">
      Entrar
    </button>

  </form>

</div>

<script src="js/config.js"></script>
<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const res = await fetch(`${API_URL}/auth/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);

    // redirige al panel
    window.location.href = "/";
  } else {
    alert(data.error);
  }
});
</script>

<div class="text-center mt-3">
  <a href="/register.html">¿No tienes cuenta? Regístrate</a>
</div>

</body>
</html>
